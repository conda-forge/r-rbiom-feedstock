{% set version = "3.1.0" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-rbiom
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/rbiom_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/rbiom/rbiom_{{ version }}.tar.gz
  sha256: 7fc55e2267489a952e9d5fe06f79dbd4cdff202f9b3ebb4fe694c72f56d1a621

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/

requirements:

  host:
    - r-base
    - r-ape
    - r-dplyr
    - r-ecodive
    - r-emmeans
    - r-fillpattern
    - r-ggbeeswarm
    - r-ggnewscale
    - r-ggplot2
    - r-ggrepel
    - r-ggtext
    - r-jsonlite
    - r-magrittr
    - r-parallelly
    - r-patchwork
    - r-pillar
    - r-plyr
    - r-readr
    - r-readxl
    - r-slam
    - r-vegan

  run:
    - r-base
    - r-ape
    - r-dplyr
    - r-ecodive
    - r-emmeans
    - r-fillpattern
    - r-ggbeeswarm
    - r-ggnewscale
    - r-ggplot2
    - r-ggrepel
    - r-ggtext
    - r-jsonlite
    - r-magrittr
    - r-parallelly
    - r-patchwork
    - r-pillar
    - r-plyr
    - r-readr
    - r-readxl
    - r-slam
    - r-vegan

test:
  commands:
    - $R -e "library('rbiom')"           # [not win]
    - "\"%R%\" -e \"library('rbiom')\""  # [win]

about:
  home: https://cmmr.github.io/rbiom/index.html
  dev_url: https://github.com/cmmr/rbiom
  license: MIT
  license_family: MIT
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/MIT
    - LICENSE
  summary:  A toolkit for working with Biological Observation Matrix ('BIOM') files.
    Read/write all 'BIOM' formats.
    Compute rarefaction, alpha diversity, and beta diversity (including 'UniFrac').
    Summarize counts by taxonomic level. Subset based on metadata.
    Generate visualizations and statistical analyses.

extra:
  recipe-maintainers:
    - conda-forge/r
    - dansmith01
